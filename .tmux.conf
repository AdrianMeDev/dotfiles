# Minimal tmux config for project work inside WSL2
# Idea:
# - one tmux session per project
# - tmux handles panes/processes
# - Neovim handles code splits/tabs inside the editor

# Easier prefix than Ctrl-b
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Quality of life
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -s escape-time 0
set -g history-limit 100000
setw -g mode-keys vi

# Keep the status bar simple
set -g status-left-length 30
set -g status-right-length 80
set -g status-left '#S '
set -g status-right '#H | %Y-%m-%d %H:%M '

# Hide the tmux status bar to avoid duplicating WezTerm and Neovim UI.
# tmux becomes the invisible process/pane manager.
set -g status off

# Keep normal terminal copy/scroll behavior.
# If you want tmux mouse support later, change this to: set -g mouse on
set -g mouse off

# Split panes in the current directory
bind - split-window -v -c "#{pane_current_path}"
bind \\ split-window -h -c "#{pane_current_path}"

# Vim-like pane movement
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with Shift + hjkl after prefix
bind -r H resize-pane -L 5
bind -r J resize-pane -D 3
bind -r K resize-pane -U 3
bind -r L resize-pane -R 5

# New window in the current directory
bind c new-window -c "#{pane_current_path}"

# Reload config quickly
bind r source-file ~/.tmux.conf \; display-message 'tmux.conf reloaded'
